# ──────────────────────────────────────────────────
#  EduPulse — Docker Compose Production Overrides
# ──────────────────────────────────────────────────
#  Usage:  docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ──────────────────────────────────────────────────

services:

  nginx:
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  api:
    entrypoint: ["/bin/bash", "/app/scripts/entrypoint.sh"]
    environment:
      - APP_ENV=production
      - DEBUG=false
      - GUNICORN_WORKERS=4
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    # Remove volume mount in production — use baked-in code
    volumes: []

  worker:
    environment:
      - APP_ENV=production
      - CELERY_CONCURRENCY=4
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 384M
        reservations:
          cpus: "0.10"
          memory: 128M
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # Remove volume mount in production — use baked-in code
    volumes: []

  db:
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    # Don't expose ports in production — only accessible via internal network
    ports: []
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-}
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.10"
          memory: 64M
    # Don't expose ports in production
    ports: []
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
