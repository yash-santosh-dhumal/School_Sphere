# ──────────────────────────────────────────────────
#  EduPulse — Docker Compose (Development)
# ──────────────────────────────────────────────────
#  Usage:  docker compose up --build -d
# ──────────────────────────────────────────────────

services:

  # ── Nginx Reverse Proxy ──
  nginx:
    image: nginx:1.27-alpine
    container_name: edupulse-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - edupulse-net
    restart: unless-stopped

  # ── FastAPI Backend ──
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: edupulse-api
    entrypoint: ["/bin/bash", "/app/scripts/entrypoint.sh"]
    env_file:
      - .env
    environment:
      - DATABASE_URL=mysql+pymysql://${MYSQL_USER:-edupulse}:${MYSQL_PASSWORD:-edupulse_secret}@db:3306/${MYSQL_DATABASE:-edupulse}
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
      - ./scripts/entrypoint.sh:/app/scripts/entrypoint.sh:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - edupulse-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    restart: unless-stopped

  # ── Celery Worker ──
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: edupulse-worker
    command: >
      celery -A app.core.celery_app:celery_app worker
      --loglevel=info
      --concurrency=${CELERY_CONCURRENCY:-2}
    env_file:
      - .env
    environment:
      - DATABASE_URL=mysql+pymysql://${MYSQL_USER:-edupulse}:${MYSQL_PASSWORD:-edupulse_secret}@db:3306/${MYSQL_DATABASE:-edupulse}
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - edupulse-net
    restart: unless-stopped

  # ── MySQL Database ──
  db:
    image: mysql:8.0
    container_name: edupulse-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_secret}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-edupulse}
      MYSQL_USER: ${MYSQL_USER:-edupulse}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-edupulse_secret}
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - edupulse-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root_secret}"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    restart: unless-stopped

  # ── Redis ──
  redis:
    image: redis:7-alpine
    container_name: edupulse-redis
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - edupulse-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped


# ── Persistent Volumes ──
volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local

# ── Network ──
networks:
  edupulse-net:
    driver: bridge
