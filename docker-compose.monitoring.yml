# ──────────────────────────────────────────────────
#  EduPulse — Monitoring Stack (Prometheus + Grafana)
# ──────────────────────────────────────────────────
#  Usage:  docker compose -f docker-compose.monitoring.yml up -d
# ──────────────────────────────────────────────────

services:

  # ── Prometheus — Metrics Collection ──
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: edupulse-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerting-rules.yml:/etc/prometheus/alerting-rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    networks:
      - edupulse-net
    restart: unless-stopped

  # ── Grafana — Dashboards & Visualization ──
  grafana:
    image: grafana/grafana:11.1.0
    container_name: edupulse-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - edupulse-net
    restart: unless-stopped

  # ── cAdvisor — Container Metrics ──
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: edupulse-cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports:
      - "8080:8080"
    networks:
      - edupulse-net
    restart: unless-stopped

  # ── Node Exporter — Host Metrics ──
  node-exporter:
    image: prom/node-exporter:v1.8.1
    container_name: edupulse-node-exporter
    command:
      - "--path.rootfs=/host"
    volumes:
      - /:/host:ro,rslave
    ports:
      - "9100:9100"
    networks:
      - edupulse-net
    restart: unless-stopped

# ── Volumes ──
volumes:
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

# ── Use the same network as the main stack ──
networks:
  edupulse-net:
    external: true
